snapshots:
  - name: scd_silver_airports
    relation: ref('silver_airports')
    config: 
      unique_key: airport_ident
      strategy: check
      check_cols: 
        - airport_type
        - airport_ident
        - airport_lat
        - airport_long
        - continent
        - iso_country 
        - iso_region 
  - name: scd_silver_runways
    relation: ref('silver_runways')
    config:
      unique_key: runway_id
      strategy: check
      check_cols: all

